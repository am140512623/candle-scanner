name: Bot - Crypto rank 300-1000 (weekly)

# Crypto market-cap rank 300-1000, scanned on the WEEKLY (and MONTHLY) candle.
# Crypto's week rolls over Monday 00:00 UTC, so weekly fires Monday; monthly
# fires on the 1st. Alerts go to your existing crypto Telegram bot.
on:
  schedule:
    - cron: "20 0 * * 1"   # weekly  (Monday 00:20 UTC, just after the weekly candle closes)
    - cron: "20 0 1 * *"   # monthly (1st of month 00:20 UTC)
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # so logged signals can be committed back to the repo
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Pull private results
        run: bash .github/scripts/pull_data.sh
        env:
          DATA_TOKEN: ${{ secrets.DATA_TOKEN }}
      - run: python scan_segment.py
        env:
          SEGMENT: crypto_top1000
          SCAN_MODE: ${{ github.event.schedule == '20 0 1 * *' && 'monthly' || 'weekly' }}
          SEG_TOKEN: ${{ secrets.CRYPTO_TOP1000_BOT_TOKEN }}
      - name: Save logged signals
        if: always()
        run: bash .github/scripts/commit_data.sh signals.csv
        env:
          DATA_TOKEN: ${{ secrets.DATA_TOKEN }}
