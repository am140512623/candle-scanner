name: Bot - Mega-Cap Stocks

# US stocks > $200B. Fires right after a candle CLOSES:
#   weekly  -> Saturday (the Mon-Fri weekly candle is finalized)
#   monthly -> 1st of the month (the previous month's candle is finalized)
on:
  schedule:
    - cron: "0 6 * * 6"   # weekly  (Saturday 06:00 UTC)
    - cron: "0 6 1 * *"   # monthly (1st of month 06:00 UTC)
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # so logged signals can be committed back to the repo
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scan_segment.py
        env:
          SEGMENT: stock_mega
          SCAN_MODE: ${{ github.event.schedule == '0 6 1 * *' && 'monthly' || 'weekly' }}
          SEG_TOKEN: ${{ secrets.STOCK_MEGA_BOT_TOKEN }}
      - name: Save logged signals
        if: always()
        run: bash .github/scripts/commit_data.sh signals.csv
