name: Bot - Small-Cap Stocks

# US stocks $250M - $2B. Fires right after a candle CLOSES:
#   weekly  -> Saturday (the Mon-Fri weekly candle is finalized)
#   monthly -> 1st of the month (the previous month's candle is finalized)
on:
  schedule:
    - cron: "15 6 * * 6"   # weekly  (Saturday 06:15 UTC)
    - cron: "15 6 1 * *"   # monthly (1st of month 06:15 UTC)
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scan_segment.py
        env:
          SEGMENT: stock_small
          SCAN_MODE: ${{ github.event.schedule == '15 6 1 * *' && 'monthly' || 'weekly' }}
          SEG_TOKEN: ${{ secrets.STOCK_SMALL_BOT_TOKEN }}
