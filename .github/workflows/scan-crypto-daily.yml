name: Crypto multi-timeframe scan

# Runs every 6 hours so the intraday frames (6h/8h/12h) are scanned near their
# closes; daily/2d/3d are covered too. Also runnable by hand from the Actions tab.
on:
  schedule:
    - cron: "5 */6 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scan_crypto.py
