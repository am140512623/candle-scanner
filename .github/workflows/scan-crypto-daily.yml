name: Crypto multi-timeframe scan

# Bot #2 -- top 300 crypto, intraday 6H..4D frames.
# (Weekly/monthly for the same top 300 is a SEPARATE bot: scan-crypto-wm.yml.)
#
# WHY NO `schedule:` HERE: GitHub's own cron scheduler fires late and bunched --
# often hours after a candle closes -- which produced late alerts and duplicates.
# This bot is instead triggered EXTERNALLY by a punctual scheduler (cron-job.org)
# that POSTs to the workflow_dispatch API right when each candle closes. The
# `frames` input tells the run which timeframe(s) just closed; empty = scan all.
#
# Re-alert safety net: scan_crypto.py also applies a freshness gate, so even if a
# trigger double-fires or arrives late, a candle that closed more than a few
# minutes ago is never alerted twice. (Tune with the CRYPTO_FRESHNESS_MIN env.)
#
# --- cron-job.org setup (one job per close time below; all times UTC) ---------
# For each job:
#   Method  : POST
#   URL     : https://api.github.com/repos/am140512623/candle-scanner/actions/workflows/scan-crypto-daily.yml/dispatches
#   Headers : Authorization: Bearer <GitHub PAT with 'actions: write' on this repo>
#             Accept: application/vnd.github+json
#             X-GitHub-Api-Version: 2022-11-28
#   Body    : {"ref":"main","inputs":{"frames":"<FRAMES>"}}
#
#   00:00  frames=""          (empty -> all frames; 2D/3D/4D self-skip off-days)
#   06:00  frames="6H"
#   08:00  frames="8H"
#   12:00  frames="6H,12H"
#   16:00  frames="8H"
#   18:00  frames="6H"
# ------------------------------------------------------------------------------
on:
  workflow_dispatch:
    inputs:
      frames:
        description: "Frames to scan, comma-separated (e.g. 6H,12H). Empty = all."
        required: false
        default: ""

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # so logged signals can be committed back to the repo
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Pull private results
        run: bash .github/scripts/pull_data.sh
        env:
          DATA_TOKEN: ${{ secrets.DATA_TOKEN }}
      - run: python scan_crypto.py
        env:
          CRYPTO_FRAMES: ${{ inputs.frames }}
          CRYPTO_BOT_TOKEN: ${{ secrets.CRYPTO_BOT_TOKEN }}
      - name: Save logged signals
        if: always()
        run: bash .github/scripts/commit_data.sh signals.csv
        env:
          DATA_TOKEN: ${{ secrets.DATA_TOKEN }}
