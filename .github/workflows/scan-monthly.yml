name: Monthly scan

# Runs on the 1st of every month at 13:00 UTC (just after the monthly
# candle closes). Also runnable by hand from the Actions tab.
on:
  schedule:
    - cron: "0 13 1 * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scan_all.py
        env:
          SCAN_MODE: monthly
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
