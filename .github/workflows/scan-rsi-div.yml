name: RSI oversold-divergence → grab scan

# Bot #6 -- RSI oversold-divergence -> liquidity-grab (LONG only), scanned across
# commodities, US index ETFs, top crypto, and every US stock cap tier, on every
# frame from 1H to 1Y. Twin of rsi_divergence_liquidity_grab.pine.
#
# Sharded two ways so no single run is huge:
#   segment -> which universe slice (commodities / indices / crypto / stock_*).
#   frames  -> which timeframe(s) just closed ("" = all; each frame self-skips on
#              its off-days, and a 90-min freshness gate blocks double-alerts).
#
# WHY NO built-in `schedule:` -- like the other bots, trigger this EXTERNALLY with a
# punctual scheduler (cron-job.org) that POSTs to the workflow_dispatch API, so cron
# lateness never causes missed/late alerts. One hourly POST per segment covers it:
#   POST https://api.github.com/repos/am140512623/candle-scanner/actions/workflows/scan-rsi-div.yml/dispatches
#   Headers: Authorization: Bearer <PAT with actions:write>
#            Accept: application/vnd.github+json
#            X-GitHub-Api-Version: 2022-11-28
#   Body:    {"ref":"main","inputs":{"segment":"commodities","frames":""}}
# The light slices (commodities/indices/crypto) can run hourly; the heavy stock
# tiers are cheaper to POST only around the daily/weekly closes (frames:"1D" etc).
#
# SECRETS required: RSI_DIV_BOT_TOKEN (this bot's own Telegram token) and,
# optionally, RSI_DIV_CHAT_ID (comma-separated recipients; defaults to A + m).
on:
  workflow_dispatch:
    inputs:
      segment:
        description: "Universe slice: commodities | indices | crypto | stock_mega | stock_large | stock_mid | stock_small"
        required: true
        default: "commodities"
      frames:
        description: "Frames to scan, comma-separated (e.g. 1H,1D). Empty = all."
        required: false
        default: ""

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # so logged signals can be committed back to the repo
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scan_rsi_div.py
        env:
          RSI_SEGMENT: ${{ inputs.segment }}
          RSI_FRAMES: ${{ inputs.frames }}
          RSI_DIV_BOT_TOKEN: ${{ secrets.RSI_DIV_BOT_TOKEN }}
          RSI_DIV_CHAT_ID: ${{ secrets.RSI_DIV_CHAT_ID }}
      - name: Save logged signals
        if: always()
        run: bash .github/scripts/commit_data.sh signals.csv
