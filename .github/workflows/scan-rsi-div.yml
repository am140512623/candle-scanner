name: RSI oversold-divergence → grab scan

# Bot #6 -- RSI oversold-divergence -> liquidity-grab (LONG only), scanned across
# commodities, US index ETFs, top crypto, and every US stock cap tier, on every
# frame from 1H to 1Y. Twin of rsi_divergence_liquidity_grab.pine.
#
# Sharded two ways so no single run is huge:
#   segment -> which universe slice (commodities / indices / crypto / stock_*).
#   frames  -> which timeframe(s) to scan ("" = all; each frame self-skips on its
#              off-days, and a 90-min freshness gate blocks double-alerts).
#
# SCHEDULING -- this bot self-runs on GitHub's built-in cron. Unlike the other
# bots, that's fine here: the freshness window is 90 min (RSI_FRESHNESS_MIN), and
# GitHub cron is only ever a few minutes late, so a late run still lands inside the
# window and alerts exactly once. Two crons:
#   * hourly  '0 * * * *'  -> the LIGHT slices (commodities, indices, crypto),
#                             all frames. Small universes, cheap to run every hour.
#   * daily   '5 0 * * *'  -> the HEAVY stock cap tiers, DAILY-and-up frames only
#                             (1D..1Y). We skip 1H/4H.. on thousands of stocks --
#                             that would mean pulling 1h candles for the whole
#                             market every hour, which isn't practical.
# Manual runs (workflow_dispatch) still scan ONE chosen segment + frames, handy for
# testing or a one-off backfill.
#
# SECRETS required: RSI_DIV_BOT_TOKEN (this bot's own Telegram token) and,
# optionally, RSI_DIV_CHAT_ID (comma-separated recipients; defaults to A + m).
on:
  schedule:
    - cron: "0 * * * *"     # hourly  -> commodities / indices / crypto (all frames)
    - cron: "5 0 * * *"     # 00:05 UTC daily -> stock tiers (1D..1Y only)
  workflow_dispatch:
    inputs:
      segment:
        description: "Universe slice: commodities | indices | crypto | stock_mega | stock_large | stock_mid | stock_small"
        required: true
        default: "commodities"
      frames:
        description: "Frames to scan, comma-separated (e.g. 1H,1D). Empty = all."
        required: false
        default: ""

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # so logged signals can be committed back to the repo
    strategy:
      fail-fast: false
      # Which segments run depends on how the workflow fired:
      #   manual        -> just the one segment you chose
      #   00:05 daily   -> the four stock cap tiers
      #   hourly        -> the three light slices
      matrix:
        segment: ${{ github.event_name == 'workflow_dispatch'
          && fromJSON(format('["{0}"]', inputs.segment))
          || (github.event.schedule == '5 0 * * *'
            && fromJSON('["stock_mega","stock_large","stock_mid","stock_small"]')
            || fromJSON('["commodities","indices","crypto"]')) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scan_rsi_div.py
        env:
          RSI_SEGMENT: ${{ matrix.segment }}
          # Manual = your chosen frames; daily stock run = daily-and-up only (no
          # intraday on the whole stock market); hourly light run = all frames.
          RSI_FRAMES: ${{ github.event_name == 'workflow_dispatch'
            && inputs.frames
            || (github.event.schedule == '5 0 * * *'
              && '1D,2D,3D,4D,1W,1M,3M,6M,1Y'
              || '') }}
          RSI_DIV_BOT_TOKEN: ${{ secrets.RSI_DIV_BOT_TOKEN }}
          RSI_DIV_CHAT_ID: ${{ secrets.RSI_DIV_CHAT_ID }}
      - name: Save logged signals
        if: always()
        run: bash .github/scripts/commit_data.sh signals.csv
